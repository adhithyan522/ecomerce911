<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mb-2">
            <h1>{{product.name}}</h1>
            <img src="{{product.image}}" alt="Product" class="img-fluid rounded mb-3 product-image" id="mainImage">
            
        </div>


        <div class="col-md-6">
            <h2 class="mb-3">{{product.title}}</h2>
            <p class="text-muted mb-4"></p>
            <div class="mb-3">
                <span class="h4 me-2">{{product.price}}</span>
                <span class="text-muted"><s>{{product.rating.rate}}</s></span>
            </div>
            <div class="mb-3">
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-half text-warning"></i>
                <span class="ms-2">4.5 (120 reviews)</span>
            </div>
            <p class="mb-4">{{product.description}}.</p>
            <div class="mb-4">
                <label for="quantity" class="form-label">Quantity:</label>
                <input type="number" class="form-control" id="quantity" value="1" min="1" style="width: 80px;">
            </div>
            <button class="btn btn-primary btn-lg mb-3 me-2">
                    <i class="bi bi-cart-plus"></i> Buy Now
                </button>
            <button class="btn btn-outline-secondary btn-lg mb-3">
                    <i class="bi bi-heart"></i> Add to Cart
                </button>
        </div>
    </div>
</div>
